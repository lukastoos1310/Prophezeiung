<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Prophezeiung</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
radial-gradient(circle at center,#120000,#000000 70%);
color:#d6c7a1;
font-family:'Cinzel',serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
/* Verhindert horizontales Scrollen, erlaubt aber vertikales Scrollen falls nötig */
overflow-x: hidden;
overflow-y: auto;
padding: 20px 0;
}

/* Dunkler Nebel */
body::before{
content:"";
position:absolute;
width:300%;
height:300%;
background:
radial-gradient(circle,
rgba(255,0,0,0.05),
transparent 50%);
animation:mist 25s linear infinite;
z-index: 1;
}

@keyframes mist{
from{transform:translate(-10%,-10%) rotate(0deg);}
to{transform:translate(10%,10%) rotate(360deg);}
}

.container{
text-align:center;
z-index:10;
padding:30px;
max-width:1000px;
width: 100%;
}

.symbol{
font-size:90px;
color:rgba(255,0,0,0.15);
margin-bottom:15px;
animation:pulse 4s infinite;
}

@keyframes pulse{
0%,100%{opacity:0.3;}
50%{opacity:1;}
}

.title{
font-size:4rem;
letter-spacing:8px;
text-shadow:
0 0 10px #ff0000,
0 0 30px #990000;
word-wrap: break-word; /* Schützt vor Text-Umbruch-Fehlern */
}

.subtitle{
margin-top:20px;
margin-bottom:50px;
color:#8f8f8f;
font-style:italic;
line-height:1.8;
}

.countdown{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.box{
width:180px;
height:180px;
border:1px solid rgba(255,0,0,0.3);
background:rgba(0,0,0,0.5);
backdrop-filter:blur(5px);
box-shadow:
0 0 15px rgba(255,0,0,0.2),
inset 0 0 20px rgba(255,0,0,0.1);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.number{
font-size:4rem;
color:#fff;
text-shadow:
0 0 10px red,
0 0 25px red;
}

.label{
margin-top:10px;
letter-spacing:3px;
color:#999;
}

.footer{
margin-top:50px;
color:#6e6e6e;
letter-spacing:4px;
}

.finished{
font-size:4rem;
color:red;
text-shadow:
0 0 20px red,
0 0 50px red;
animation:pulse 2s infinite;
}

/* ==========================================================
HANDY-OPTIMIERUNG (Für Bildschirme kleiner als 768px)
========================================================== */
@media (max-width: 768px) {
.title {
font-size: 2.2rem; /* Macht die Überschrift passend fürs Handy */
letter-spacing: 4px;
}

.subtitle {
font-size: 0.95rem;
margin-bottom: 35px;
padding: 0 10px;
}

.symbol {
font-size: 60px;
}

.countdown {
gap: 12px; /* Etwas engere Abstände für kompakte Displays */
}

.box {
width: 140px; /* Perfekte Größe, damit auf Handys immer 2 Boxen nebeneinander passen */
height: 140px;
}

.number {
font-size: 2.8rem; /* Zahlen innerhalb der Boxen verkleinert */
}

.label {
font-size: 0.8rem;
letter-spacing: 1px;
}

.footer {
margin-top: 40px;
font-size: 0.9rem;
}

.finished {
font-size: 2.2rem;
}
}
</style>
</head>
<body>

<div class="container">

<div class="symbol">⛧</div>

<h1 class="title">DIE PROPHEZEIUNG</h1>

<p class="subtitle">
„Wenn die letzte Sekunde vergeht,<br>
öffnet sich das Tor zwischen den Welten.“
</p>

<div class="countdown">

<div class="box">
<div id="days" class="number">00</div>
<div class="label">TAGE</div>
</div>

<div class="box">
<div id="hours" class="number">00</div>
<div class="label">STUNDEN</div>
</div>

<div class="box">
<div id="minutes" class="number">00</div>
<div class="label">MINUTEN</div>
</div>

<div class="box">
<div id="seconds" class="number">00</div>
<div class="label">SEKUNDEN</div>
</div>

</div>

<div class="footer">
20.06.2026 • 20:00 UHR
</div>

</div>

<script>

const target = new Date("2026-06-20T20:00:00");

function updateCountdown(){

const now = new Date();
const diff = target - now;

if(diff <= 0){
document.querySelector(".container").innerHTML =
'<div class="finished">DAS TOR IST GEÖFFNET</div>';
return;
}

const days = Math.floor(diff / (1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60)) % 24);
const minutes = Math.floor((diff/(1000*60)) % 60);
const seconds = Math.floor((diff/1000) % 60);

document.getElementById("days").textContent =
String(days).padStart(2,"0");

document.getElementById("hours").textContent =
String(hours).padStart(2,"0");

document.getElementById("minutes").textContent =
String(minutes).padStart(2,"0");

document.getElementById("seconds").textContent =
String(seconds).padStart(2,"0");
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
